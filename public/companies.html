<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Empresas - FactuElectrónica</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .cert-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:18px; }
    .cert-panel h3 { margin:0 0 14px; font-size:15px; color:var(--text-primary); display:flex; align-items:center; gap:8px; }
    .cert-status-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .cert-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .cert-badge.ok   { background:#d1fae5; color:#065f46; }
    .cert-badge.warn { background:#fef3c7; color:#92400e; }
    .cert-badge.none { background:#f3f4f6; color:#6b7280; }
    .cert-badge.error{ background:#fee2e2; color:#991b1b; }
    .mode-toggle { display:flex; gap:10px; align-items:center; }
    .mode-btn { padding:7px 18px; border-radius:8px; border:2px solid var(--border); background:var(--bg-card);
                color:var(--text-secondary); font-weight:600; font-size:13px; cursor:pointer; transition:all .2s; }
    .mode-btn.active-sim  { border-color:#f59e0b; background:#fffbeb; color:#92400e; }
    .mode-btn.active-prod { border-color:#10b981; background:#ecfdf5; color:#065f46; }
    .mode-btn:hover:not(.active-sim):not(.active-prod) { border-color:var(--primary); }
    .upload-zone { border:2px dashed var(--border); border-radius:10px; padding:20px; text-align:center;
                   cursor:pointer; transition:all .2s; }
    .upload-zone:hover, .upload-zone.drag { border-color:var(--primary); background:rgba(99,102,241,.04); }
    .upload-zone input[type=file] { display:none; }
    .upload-zone label { cursor:pointer; color:var(--primary); font-weight:600; }
    .cert-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:600px){ .cert-form-grid{ grid-template-columns:1fr; } }
    .cert-info-table td { padding:4px 10px 4px 0; font-size:13px; }
    .cert-info-table td:first-child { color:var(--text-secondary); width:160px; }
    .pac-list { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .pac-opt  { padding:6px 14px; border-radius:8px; border:2px solid var(--border); font-size:13px;
                cursor:pointer; font-weight:500; transition:all .15s; }
    .pac-opt.selected { border-color:var(--primary); background:rgba(99,102,241,.08); color:var(--primary); }
    .tab-bar { display:flex; gap:4px; margin-bottom:18px; border-bottom:2px solid var(--border); }
    .tab-item { padding:10px 18px; cursor:pointer; font-size:14px; font-weight:600;
                color:var(--text-secondary); border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab-item.active { color:var(--primary); border-bottom-color:var(--primary); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .emision-log-table { font-size:13px; }
    .emision-log-table th, .emision-log-table td { padding:8px 10px; }
  </style>
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    renderLayout('companies', 'Empresas Emisoras');
    let empresas = [], paises = [], certEstado = {}, currentEmpresaId = null;

    async function init() {
      const [pr, er] = await Promise.all([API.get('/countries'), API.get('/companies')]);
      paises = pr.data; empresas = er.data;
      renderContent();
    }

    function renderContent() {
      setContent(`
        <div class="tab-bar">
          <div class="tab-item active" onclick="showTab('tab-list', this)">Empresas</div>
          ${currentEmpresaId ? `<div class="tab-item" onclick="showTab('tab-cert', this)">Certificado Digital</div>` : ''}
        </div>

        <!-- TAB LISTA -->
        <div id="tab-list" class="tab-panel active">
          <div class="card p-0">
            <div class="card-header">
              <h2>Empresas emisoras</h2>
              ${Auth.user?.rol === 'admin' ? '<button class="btn btn-primary" onclick="openModal()">+ Nueva empresa</button>' : ''}
            </div>
          </div>
          <div id="alert-box" style="padding:0 22px"></div>
          <div class="table-wrapper">
            <table class="table">
              <thead><tr>
                <th>Identificación</th><th>Razón social</th>
                <th>Ciudad</th><th>Ambiente</th><th>Modo emisión</th>
                <th class="text-right">Acciones</th>
              </tr></thead>
              <tbody>
                ${empresas.map(e => `
                  <tr>
                    <td><strong>${escapeHtml(e.identificacion_fiscal)}</strong></td>
                    <td>${escapeHtml(e.razon_social)}<br><small class="text-muted">${escapeHtml(e.nombre_comercial || '')}</small></td>
                    <td>${escapeHtml(e.ciudad || '')}</td>
                    <td><span class="badge ${e.ambiente === 'produccion' ? 'badge-emitida' : 'badge-borrador'}">${e.ambiente || 'pruebas'}</span></td>
                    <td>
                      <span class="cert-badge ${e.modo_emision === 'produccion' ? 'ok' : 'none'}">
                        ${e.modo_emision === 'produccion' ? '🔐 Producción' : '🧪 Simulado'}
                      </span>
                    </td>
                    <td class="text-right" style="white-space:nowrap">
                      <button class="btn btn-sm btn-secondary" onclick="edit(${e.id})">Editar</button>
                      ${Auth.user?.rol === 'admin' ? `<button class="btn btn-sm" style="background:var(--primary);color:#fff;margin-left:4px" onclick="openCert(${e.id})">🔑 Certificado</button>` : ''}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- TAB CERTIFICADO -->
        <div id="tab-cert" class="tab-panel">
          <div id="cert-content">
            <p style="color:var(--text-secondary);padding:20px">Selecciona una empresa para gestionar su certificado.</p>
          </div>
        </div>

        <!-- MODAL empresa -->
        <div class="modal-overlay" id="modal">
          <div class="modal modal-lg">
            <div class="modal-header">
              <h2 id="modal-title">Empresa</h2>
              <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
              <form id="form">
                <input type="hidden" id="f-id">
                <input type="hidden" id="f-pais_id" value="3">
                <div class="form-row">
                  <div class="form-group">
                    <label>Identificación fiscal (RFC/NIT/RUC/RUT) *</label>
                    <input type="text" id="f-identificacion_fiscal" required>
                  </div>
                  <div class="form-group">
                    <label>Ambiente</label>
                    <select id="f-ambiente">
                      <option value="pruebas">Pruebas</option>
                      <option value="produccion">Producción</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label>Razón social *</label>
                  <input type="text" id="f-razon_social" required>
                </div>
                <div class="form-group">
                  <label>Nombre comercial</label>
                  <input type="text" id="f-nombre_comercial">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Régimen fiscal</label>
                    <input type="text" id="f-regimen_fiscal">
                  </div>
                  <div class="form-group">
                    <label>PAC / Proveedor</label>
                    <input type="text" id="f-pac_proveedor" placeholder="finkok, sw_sapien, dian...">
                  </div>
                </div>
                <div class="form-group">
                  <label>Dirección</label>
                  <input type="text" id="f-direccion">
                </div>
                <div class="form-row">
                  <div class="form-group"><label>Ciudad</label><input type="text" id="f-ciudad"></div>
                  <div class="form-group"><label>Estado/Provincia</label><input type="text" id="f-estado_provincia"></div>
                  <div class="form-group"><label>Código Postal</label><input type="text" id="f-codigo_postal"></div>
                </div>
                <div class="form-row">
                  <div class="form-group"><label>Teléfono</label><input type="text" id="f-telefono"></div>
                  <div class="form-group"><label>Email</label><input type="email" id="f-email"></div>
                </div>
                <div class="form-actions">
                  <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                  <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      `);
      document.getElementById('form').addEventListener('submit', save);
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function showTab(tabId, el) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      el.classList.add('active');
    }

    // ── Modal empresa ─────────────────────────────────────────────────────────
    function openModal() {
      document.getElementById('form').reset();
      document.getElementById('f-id').value = '';
      document.getElementById('modal-title').textContent = 'Nueva empresa';
      document.getElementById('modal').classList.add('active');
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function edit(id) {
      const { data } = await API.get(`/companies/${id}`);
      Object.keys(data).forEach(k => {
        const el = document.getElementById('f-' + k);
        if (el) el.value = data[k] ?? '';
      });
      document.getElementById('modal-title').textContent = 'Editar empresa';
      document.getElementById('modal').classList.add('active');
    }

    async function save(e) {
      e.preventDefault();
      const id = document.getElementById('f-id').value;
      const body = {
        pais_id: document.getElementById('f-pais_id').value,
        identificacion_fiscal: document.getElementById('f-identificacion_fiscal').value,
        razon_social: document.getElementById('f-razon_social').value,
        nombre_comercial: document.getElementById('f-nombre_comercial').value,
        regimen_fiscal: document.getElementById('f-regimen_fiscal').value,
        pac_proveedor: document.getElementById('f-pac_proveedor').value,
        direccion: document.getElementById('f-direccion').value,
        ciudad: document.getElementById('f-ciudad').value,
        estado_provincia: document.getElementById('f-estado_provincia').value,
        codigo_postal: document.getElementById('f-codigo_postal').value,
        telefono: document.getElementById('f-telefono').value,
        email: document.getElementById('f-email').value,
        ambiente: document.getElementById('f-ambiente').value
      };
      try {
        if (id) await API.put(`/companies/${id}`, body);
        else    await API.post('/companies', body);
        closeModal();
        showAlert('#alert-box', 'Guardado correctamente', 'success');
        setTimeout(() => { empresas = []; init(); }, 800);
      } catch (err) {
        showAlert('#alert-box', err.message);
      }
    }

    // ── Panel Certificado ─────────────────────────────────────────────────────
    async function openCert(id) {
      currentEmpresaId = id;
      renderContent();
      // Activar pestaña cert
      const tabBar = document.querySelector('.tab-bar');
      const tabItems = tabBar.querySelectorAll('.tab-item');
      if (tabItems.length > 1) {
        tabItems[0].classList.remove('active');
        tabItems[1].classList.add('active');
        document.getElementById('tab-list').classList.remove('active');
        document.getElementById('tab-cert').classList.add('active');
      }
      await loadCertPanel(id);
    }

    async function loadCertPanel(id) {
      const emp = empresas.find(e => e.id === id);
      document.getElementById('cert-content').innerHTML = '<p style="padding:16px;color:var(--text-secondary)">Cargando...</p>';
      try {
        const { data: cert } = await API.get(`/companies/${id}/certificado`);
        certEstado = cert;
        renderCertPanel(id, emp, cert);
      } catch(e) {
        renderCertPanel(id, emp, {});
      }
    }

    function renderCertPanel(id, emp, cert) {
      const vencido = cert.cert_vencido;
      const tieneP12 = cert.tiene_certificado;
      const tieneLlave = cert.tiene_llave_privada;
      const modo = cert.modo_emision || 'simulado';

      document.getElementById('cert-content').innerHTML = `
        <h3 style="margin-bottom:16px">
          Certificado Digital —
          <span style="color:var(--text-secondary);font-weight:500">${escapeHtml(emp?.razon_social || '')}</span>
        </h3>

        <!-- Estado actual -->
        <div class="cert-panel">
          <h3>📊 Estado actual</h3>
          <div class="cert-status-row">
            <span class="cert-badge ${tieneP12 ? (vencido ? 'error' : 'ok') : 'none'}">
              ${tieneP12 ? (vencido ? '⚠ Cert. vencido' : '✓ Certificado cargado') : '— Sin certificado'}
            </span>
            <span class="cert-badge ${tieneLlave ? 'ok' : 'none'}">
              ${tieneLlave ? '✓ Llave privada' : '— Sin llave privada'}
            </span>
            <span class="cert-badge ${modo === 'produccion' ? 'ok' : 'warn'}">
              ${modo === 'produccion' ? '🔐 Modo PRODUCCIÓN' : '🧪 Modo SIMULADO'}
            </span>
          </div>
          ${cert.cert_sujeto ? `
            <table class="cert-info-table">
              <tr><td>Titular</td><td><strong>${escapeHtml(cert.cert_sujeto)}</strong></td></tr>
              <tr><td>Emisor</td><td>${escapeHtml(cert.cert_emisor || '')}</td></tr>
              <tr><td>Válido desde</td><td>${cert.cert_valido_desde ? new Date(cert.cert_valido_desde).toLocaleDateString() : ''}</td></tr>
              <tr><td>Válido hasta</td><td style="color:${vencido?'#dc2626':''}">
                <strong>${cert.cert_valido_hasta ? new Date(cert.cert_valido_hasta).toLocaleDateString() : ''}</strong>
              </td></tr>
              ${cert.no_certificado ? `<tr><td>N° Certificado</td><td><code>${escapeHtml(cert.no_certificado)}</code></td></tr>` : ''}
            </table>
          ` : '<p style="color:var(--text-secondary);font-size:13px">No hay información de certificado cargada.</p>'}
        </div>

        <!-- Subir certificado -->
        <div class="cert-panel">
          <h3>📤 Cargar certificado digital</h3>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">
            Suba el certificado digital (.p12 / .pfx) emitido por una Entidad de Certificación autorizada en el Perú para su uso ante la SUNAT.
          </p>
          <form id="cert-form" onsubmit="saveCert(event, ${id})">
            <div class="cert-form-grid">
              <div class="form-group">
                <label>Certificado (.p12 / .pfx / .cer / .pem)</label>
                <div class="upload-zone" id="drop-cert" onclick="document.getElementById('file-cert').click()">
                  <input type="file" id="file-cert" accept=".p12,.pfx,.cer,.crt,.pem"
                         onchange="showFileName(this,'drop-cert')">
                  <div id="lbl-cert">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 6px;display:block;color:var(--primary)">
                      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <label>Haga clic para seleccionar</label>
                    <p style="font-size:11px;color:var(--text-secondary);margin:4px 0 0">.p12, .pfx, .cer, .pem</p>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>Llave privada (.key) — Solo si no es P12</label>
                <div class="upload-zone" id="drop-key" onclick="document.getElementById('file-key').click()">
                  <input type="file" id="file-key" accept=".key,.pem"
                         onchange="showFileName(this,'drop-key')">
                  <div id="lbl-key">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 6px;display:block;color:var(--text-secondary)">
                      <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                    <label style="color:var(--text-secondary)">Haga clic para seleccionar</label>
                    <p style="font-size:11px;color:var(--text-secondary);margin:4px 0 0">Opcional: .key, .pem</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="cert-form-grid" style="margin-top:14px">
              <div class="form-group">
                <label>Contraseña del certificado</label>
                <input type="password" id="cert-password" placeholder="Contraseña de su .p12 / .key">
              </div>
              <div class="form-group">
                <label>N° Certificado (México SAT, 20 dígitos)</label>
                <input type="text" id="cert-no" maxlength="20" placeholder="Auto-detectado del certificado">
              </div>
            </div>
            <div class="form-actions" style="margin-top:10px">
              <button type="submit" class="btn btn-primary">💾 Guardar certificado</button>
              ${tieneP12 ? `<button type="button" class="btn btn-danger" onclick="deleteCert(${id})"
                style="background:#ef4444;color:#fff;border:none;margin-left:8px">🗑 Eliminar certificado</button>` : ''}
            </div>
          </form>
        </div>

        <!-- Configuración PAC/OSE -->
        <div class="cert-panel">
          <h3>⚙️ Configuración PAC / OSE / Proveedor tecnológico</h3>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
            Ingrese las credenciales del proveedor de timbrado/autorización según su país.
          </p>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--text-secondary)">Seleccione proveedor:</label>
            <div class="pac-list" id="pac-list">
              ${[
                {id:'sunat',     label:'SUNAT (PE)'},
                {id:'ose',       label:'OSE (PE)'},
              ].map(p => `
                <div class="pac-opt ${cert.pac_proveedor === p.id ? 'selected' : ''}"
                     onclick="selectPac('${p.id}', this)"
                     data-id="${p.id}">${p.label}</div>
              `).join('')}
            </div>
          </div>
          <form id="pac-form" onsubmit="savePac(event, ${id})" style="margin-top:16px">
            <div class="cert-form-grid">
              <div class="form-group">
                <label>Usuario / Software ID</label>
                <input type="text" id="pac-usuario" value="${escapeHtml(cert.pac_usuario || '')}"
                       placeholder="Usuario o softwareId del PAC">
              </div>
              <div class="form-group">
                <label>Contraseña / Software Pin</label>
                <input type="password" id="pac-password" placeholder="Contraseña del PAC/OSE">
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">💾 Guardar PAC</button>
            </div>
          </form>
        </div>

        <!-- Modo de emisión -->
        <div class="cert-panel">
          <h3>🚀 Modo de emisión</h3>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">
            <strong>Simulado:</strong> Genera XML válido pero sin enviar a la autoridad fiscal. Ideal para desarrollo y pruebas.<br>
            <strong>Producción:</strong> Firma digitalmente y envía a la autoridad fiscal real. Requiere certificado válido y credenciales PAC.
          </p>
          <div class="mode-toggle">
            <button class="mode-btn ${modo === 'simulado' ? 'active-sim' : ''}"
                    onclick="setModo(${id},'simulado')">
              🧪 Modo SIMULADO
            </button>
            <button class="mode-btn ${modo === 'produccion' ? 'active-prod' : ''}"
                    onclick="setModo(${id},'produccion')">
              🔐 Modo PRODUCCIÓN
            </button>
          </div>
          <p style="font-size:12px;color:var(--text-secondary);margin-top:10px">
            Modo actual: <strong>${modo.toUpperCase()}</strong>
          </p>
        </div>

        <div id="cert-alert" style="margin-top:10px"></div>
      `;
    }

    function showFileName(input, zoneId) {
      if (!input.files.length) return;
      const zone = document.getElementById(zoneId);
      zone.style.borderColor = 'var(--primary)';
      zone.style.background  = 'rgba(99,102,241,.05)';
      const lbl = zone.querySelector('div');
      lbl.innerHTML = `<p style="font-weight:600;color:var(--primary)">${escapeHtml(input.files[0].name)}</p>
                       <p style="font-size:11px;color:var(--text-secondary)">${(input.files[0].size/1024).toFixed(1)} KB</p>`;
    }

    let selectedPac = null;
    function selectPac(id, el) {
      selectedPac = id;
      document.querySelectorAll('.pac-opt').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function saveCert(e, id) {
      e.preventDefault();
      const certFile = document.getElementById('file-cert').files[0];
      const keyFile  = document.getElementById('file-key').files[0];
      if (!certFile) { showAlert('#cert-alert', 'Seleccione al menos un archivo de certificado'); return; }

      const fd = new FormData();
      fd.append('certificado', certFile);
      if (keyFile) fd.append('llave_privada', keyFile);
      const pwd = document.getElementById('cert-password').value;
      const no  = document.getElementById('cert-no').value;
      if (pwd) fd.append('password', pwd);
      if (no)  fd.append('no_certificado', no);

      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`/api/companies/${id}/certificado`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: fd,
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        showAlert('#cert-alert', 'Certificado guardado correctamente', 'success');
        setTimeout(() => loadCertPanel(id), 1200);
      } catch(err) {
        showAlert('#cert-alert', err.message);
      }
    }

    async function savePac(e, id) {
      e.preventDefault();
      const body = {
        pac_proveedor: selectedPac || certEstado.pac_proveedor,
        pac_usuario:   document.getElementById('pac-usuario').value,
        pac_password:  document.getElementById('pac-password').value,
      };
      // Enviar como multipart vacío para reutilizar endpoint
      const fd = new FormData();
      Object.entries(body).forEach(([k,v]) => { if(v) fd.append(k,v); });
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`/api/companies/${id}/certificado`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: fd,
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        showAlert('#cert-alert', 'Configuración PAC guardada', 'success');
      } catch(err) {
        showAlert('#cert-alert', err.message);
      }
    }

    async function setModo(id, modo) {
      try {
        await API.put(`/companies/${id}/modo-emision`, { modo_emision: modo });
        showAlert('#cert-alert', `Modo ${modo.toUpperCase()} activado`, 'success');
        setTimeout(() => loadCertPanel(id), 800);
        // Actualizar lista
        const emp = empresas.find(e => e.id === id);
        if (emp) emp.modo_emision = modo;
      } catch(err) {
        showAlert('#cert-alert', err.message);
      }
    }

    async function deleteCert(id) {
      if (!confirm('¿Eliminar el certificado? La empresa volverá a modo simulado.')) return;
      try {
        await API.delete(`/companies/${id}/certificado`);
        showAlert('#cert-alert', 'Certificado eliminado. Modo simulado activado.', 'success');
        setTimeout(() => loadCertPanel(id), 1000);
      } catch(err) {
        showAlert('#cert-alert', err.message);
      }
    }

    init();
  </script>
</body>
</html>
