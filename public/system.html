<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento - FactuElectrónica</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* Premium Modern Aesthetics for System Module */
    
    .system-header-banner {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        border-radius: 20px;
        padding: 32px 40px;
        margin-bottom: 32px;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        position: relative;
        overflow: hidden;
    }

    .system-header-banner::before {
        content: '';
        position: absolute;
        top: -50%; right: -10%;
        width: 300px; height: 300px;
        background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(255,255,255,0) 70%);
        border-radius: 50%;
        filter: blur(40px);
    }

    .shb-content h2 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        color: white;
    }
    
    .shb-content p {
        color: #94a3b8;
        font-size: 15px;
        max-width: 500px;
        line-height: 1.6;
    }

    .shb-icon {
        color: rgba(255,255,255,0.05);
        position: absolute;
        right: 40px;
        top: 50%;
        transform: translateY(-50%);
    }

    .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 32px;
    }

    .module-card {
        background: #ffffff;
        border-radius: 24px;
        padding: 32px;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(226, 232, 240, 0.8);
        display: flex;
        flex-direction: column;
        height: 100%;
        z-index: 1;
    }

    .module-card::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 6px;
        transition: all 0.3s ease;
    }

    .module-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    .mc-icon-wrapper {
        width: 72px; height: 72px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        transition: all 0.3s ease;
    }

    .module-card:hover .mc-icon-wrapper {
        transform: scale(1.1) rotate(5deg);
    }

    .mc-title {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
    }

    .mc-desc {
        color: #64748b;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 32px;
        flex-grow: 1;
    }

    /* Green Theme (Backup) */
    .card-green::after { background: linear-gradient(90deg, #10b981, #34d399); }
    .card-green .mc-icon-wrapper { background: #d1fae5; color: #10b981; box-shadow: 0 10px 20px -5px rgba(16,185,129,0.3); }
    .btn-gradient-green {
        background: linear-gradient(135deg, #059669 0%, #10b981 100%);
        color: white; border: none; font-weight: 700; width: 100%; padding: 14px; border-radius: 14px; font-size: 15px;
        transition: all 0.3s; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-gradient-green:hover { box-shadow: 0 10px 15px -3px rgba(16,185,129,0.4); transform: translateY(-2px); }

    /* Blue Theme (Restore) */
    .card-blue::after { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .card-blue .mc-icon-wrapper { background: #dbeafe; color: #3b82f6; box-shadow: 0 10px 20px -5px rgba(59,130,246,0.3); }
    .btn-gradient-blue {
        background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        color: white; border: none; font-weight: 700; width: 100%; padding: 14px; border-radius: 14px; font-size: 15px;
        transition: all 0.3s; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-gradient-blue:hover { box-shadow: 0 10px 15px -3px rgba(59,130,246,0.4); transform: translateY(-2px); }

    /* Red Theme (Reset) */
    .card-red {
        background: linear-gradient(180deg, #ffffff 0%, #fff5f5 100%);
        border: 1px solid #fecaca;
    }
    .card-red::after { background: linear-gradient(90deg, #ef4444, #f87171); }
    .card-red .mc-icon-wrapper { background: #fee2e2; color: #ef4444; box-shadow: 0 10px 20px -5px rgba(239,68,68,0.3); }
    .btn-gradient-red {
        background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
        color: white; border: none; font-weight: 700; width: 100%; padding: 14px; border-radius: 14px; font-size: 15px;
        transition: all 0.3s; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-gradient-red:hover { box-shadow: 0 10px 15px -3px rgba(239,68,68,0.4); transform: translateY(-2px); }

    /* Custom File Input */
    .custom-file-upload {
        border: 2px dashed #cbd5e1;
        border-radius: 14px;
        padding: 16px;
        text-align: center;
        margin-bottom: 20px;
        cursor: pointer;
        transition: all 0.2s;
        background: #f8fafc;
        position: relative;
    }
    .custom-file-upload:hover {
        border-color: #3b82f6;
        background: #eff6ff;
    }
    .custom-file-upload input[type="file"] {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0; cursor: pointer;
    }
    .file-name-display {
        font-size: 13px; font-weight: 600; color: #64748b;
        margin-top: 8px; display: block;
    }

    /* Warning input */
    .danger-input {
        background: #ffffff;
        border: 2px solid #fecaca;
        padding: 12px 16px;
        border-radius: 12px;
        width: 100%;
        font-weight: 700;
        color: #991b1b;
        text-align: center;
        letter-spacing: 2px;
        outline: none;
        transition: all 0.2s;
        margin-bottom: 20px;
    }
    .danger-input:focus {
        border-color: #ef4444;
        box-shadow: 0 0 0 4px rgba(239,68,68,0.1);
    }
    .danger-input::placeholder { color: #fca5a5; font-weight: 400; letter-spacing: normal; }

    @media (max-width: 1024px) {
        .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
        .grid-3 { grid-template-columns: 1fr; }
        .system-header-banner { padding: 24px; flex-direction: column; text-align: center; }
        .shb-icon { display: none; }
    }
  </style>
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    renderLayout('system', 'Mantenimiento del Sistema');

    setContent(`
      <div class="system-header-banner">
          <div class="shb-content">
              <h2>Centro de Control y Mantenimiento</h2>
              <p>Administra la seguridad de tus datos. Genera respaldos para prevenir pérdida de información o reinicia el sistema para iniciar un entorno de demostración nuevo.</p>
          </div>
          <svg class="shb-icon" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
      </div>

      <div class="grid-3" style="align-items:stretch;">

          <!-- COLUMNA 1: BACKUP -->
          <div class="module-card card-green">
              <div class="mc-icon-wrapper">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </div>
              <h3 class="mc-title">Copia de Seguridad</h3>
              <p class="mc-desc">
                  Genera y descarga un archivo <strong>.SQL</strong> con la totalidad de tu base de datos actual. Incluye clientes, facturas, productos y empresas. Se recomienda realizar esta acción diariamente.
              </p>
              
              <div style="margin-top: auto;">
                  <button id="btnBackup" class="btn-gradient-green">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> 
                      Exportar Base de Datos
                  </button>
              </div>
          </div>

          <!-- COLUMNA 2: RESTAURACIÓN -->
          <div class="module-card card-blue">
              <div class="mc-icon-wrapper">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
              </div>
              <h3 class="mc-title">Restaurar Sistema</h3>
              <p class="mc-desc">
                  Sube un archivo de copia de seguridad previo para restaurar el sistema a un estado anterior. <strong>Advertencia:</strong> Esta acción sobrescribirá todos los datos actuales.
              </p>
              
              <form id="restoreForm" style="margin-top: auto;">
                  <div class="custom-file-upload">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                      <div style="font-size: 14px; font-weight:600; color:#334155;">Seleccionar archivo .SQL</div>
                      <span class="file-name-display" id="fileNameDisplay">Ningún archivo seleccionado</span>
                      <input type="file" name="backup_file" accept=".sql" required id="backupFileInput">
                  </div>

                  <button type="submit" class="btn-gradient-blue">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> 
                      Iniciar Restauración
                  </button>
              </form>
          </div>

          <!-- COLUMNA 3: RESET (ZONA DE PELIGRO) -->
          <div class="module-card card-red">
              <div class="mc-icon-wrapper">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
              </div>
              <h3 class="mc-title" style="color: #991b1b;">Reset de Fábrica</h3>
              <p class="mc-desc" style="color: #991b1b; opacity: 0.9;">
                  Esta acción es destructiva. Eliminará <strong>absolutamente todas las facturas, empresas y clientes</strong> del sistema para dejarlo en blanco. Ideal para iniciar una nueva empresa desde cero.
              </p>
              
              <form id="resetForm" style="margin-top: auto;">
                  <input type="text" id="confirmText" class="danger-input" required placeholder="Escribe 'RESETEAR'" autocomplete="off" pattern="RESETEAR" title="Debes escribir exactamente RESETEAR en mayúsculas.">
                  
                  <button type="submit" class="btn-gradient-red">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> 
                      Borrar Todos los Datos
                  </button>
              </form>
          </div>

      </div>
    `);

    // Lógica Frontend

    // Backup
    document.getElementById('btnBackup').addEventListener('click', async () => {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/system/backup', {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.message || 'Error al generar la copia de seguridad');
            }
            
            // Forzar descarga del blob
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // Intentar obtener el filename del header
            const contentDisposition = res.headers.get('Content-Disposition');
            let filename = 'backup.sql';
            if (contentDisposition && contentDisposition.indexOf('filename=') !== -1) {
                const match = contentDisposition.match(/filename="?([^"]+)"?/);
                if (match && match[1]) filename = match[1];
            }

            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
            
            alert('Copia de seguridad generada y descargada.');
        } catch (err) {
            alert('Error: ' + err.message);
        }
    });

    // File Input UI update
    document.getElementById('backupFileInput').addEventListener('change', function(e) {
        var fileName = e.target.files[0] ? e.target.files[0].name : 'Ningún archivo seleccionado';
        document.getElementById('fileNameDisplay').textContent = fileName;
        if(e.target.files[0]) {
            document.getElementById('fileNameDisplay').style.color = '#3b82f6';
        } else {
            document.getElementById('fileNameDisplay').style.color = '#64748b';
        }
    });

    // Restore
    document.getElementById('restoreForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('backupFileInput');
        if (!fileInput.files[0]) return alert('Selecciona un archivo .sql primero');

        if (!confirm('¿Estás absolutamente seguro de querer SOBREESCRIBIR la base de datos actual? Esta acción no se puede deshacer.')) return;

        const formData = new FormData();
        formData.append('backup_file', fileInput.files[0]);

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/system/restore', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                alert('Base de datos restaurada exitosamente.');
                Auth.logout(); // Forzar re-login por seguridad
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) {
            alert('Error en la comunicación: ' + err.message);
        }
    });

    // Reset
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = document.getElementById('confirmText').value;
        if (text !== 'RESETEAR') return alert('Debes escribir RESETEAR');

        if (!confirm('ALERTA MÁXIMA: ¿Estás seguro de ELIMINAR TODOS LOS DATOS del sistema? Esta acción es irreversible.')) return;

        try {
            const res = await API.post('/system/reset', { confirm_text: text });
            if (res.success) {
                alert('Sistema reseteado a estado de fábrica. Por favor, inicia sesión nuevamente.');
                Auth.logout();
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    });

  </script>
</body>
</html>
