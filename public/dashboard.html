<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - FactuElectrónica</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    renderLayout('dashboard', 'Dashboard');

    const MONTH_NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    (async () => {
      try {
        const empresa = Auth.empresaActual;
        const url = empresa ? `/reports/dashboard?empresa_id=${empresa.id}` : '/reports/dashboard';
        const { data } = await API.get(url);
        const t = data.totales || {};
        const moneda = empresa?.moneda_codigo || 'PEN';

        const totalFacturas = Number(t.total_facturas || 0);
        const tasaEmision = totalFacturas > 0 ? Math.round((Number(t.emitidas || 0) / totalFacturas) * 100) : 0;

        setContent(`
          <div class="empresa-banner">
            <div class="info">
              <h3>${escapeHtml(empresa?.razon_social || 'Sin empresa seleccionada')}</h3>
              <p>${escapeHtml(empresa?.identificacion_fiscal || '')} ${empresa ? '· ' + escapeHtml(empresa.autoridad_fiscal) + ' · ' + escapeHtml(empresa.pais) : ''}</p>
            </div>
            <div class="meta">
              <div class="meta-item">
                <div class="label">Moneda</div>
                <div class="value">${escapeHtml(moneda)}</div>
              </div>
              <div class="meta-item">
                <div class="label">Tasa de emisión</div>
                <div class="value">${tasaEmision}%</div>
              </div>
              <div class="meta-item">
                <div class="label">Hoy</div>
                <div class="value">${new Date().toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' })}</div>
              </div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon bg-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
              </div>
              <div class="stat-label">Monto facturado</div>
              <div class="stat-value">${fmtMoney(t.monto_total, moneda)}</div>
              <div class="stat-extra">Total emitidas y timbradas</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon bg-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
              </div>
              <div class="stat-label">Total facturas</div>
              <div class="stat-value">${totalFacturas}</div>
              <div class="stat-extra">${t.emitidas || 0} emitidas, ${t.borradores || 0} en borrador</div>
            </div>
            <div class="stat-card success">
              <div class="stat-icon bg-success">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11"></polyline></svg>
              </div>
              <div class="stat-label">Emitidas</div>
              <div class="stat-value">${t.emitidas || 0}</div>
              <div class="stat-extra">${tasaEmision}% del total</div>
            </div>
            <div class="stat-card warning">
              <div class="stat-icon bg-warning">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path></svg>
              </div>
              <div class="stat-label">Borradores</div>
              <div class="stat-value">${t.borradores || 0}</div>
              <div class="stat-extra">Pendientes de emitir</div>
            </div>
            <div class="stat-card danger">
              <div class="stat-icon bg-danger">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
              </div>
              <div class="stat-label">Canceladas</div>
              <div class="stat-value">${t.canceladas || 0}</div>
              <div class="stat-extra">Anuladas</div>
            </div>
            <div class="stat-card info">
              <div class="stat-icon bg-info">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
              </div>
              <div class="stat-label">IVA recaudado</div>
              <div class="stat-value">${fmtMoney(t.iva_total, moneda)}</div>
              <div class="stat-extra">Total impuestos</div>
            </div>
          </div>

          <div class="dashboard-grid">
            <div class="card-modern">
              <div class="card-title">Facturación por mes</div>
              <div class="card-subtitle">Últimos 6 meses · ${escapeHtml(moneda)}</div>
              <div class="chart-container"><canvas id="chart-meses"></canvas></div>
            </div>
            <div class="card-modern">
              <div class="card-title">Estado de facturas</div>
              <div class="card-subtitle">Distribución actual</div>
              <div class="chart-container"><canvas id="chart-estados"></canvas></div>
            </div>
          </div>


          <div class="card-modern">
            <div class="card-title">Top clientes</div>
            <div class="card-subtitle">Los 5 clientes con mayor facturación</div>
            <div class="table-wrapper">
              <table class="table">
                <thead><tr>
                  <th>#</th><th>Cliente</th><th>Identificación</th>
                  <th class="text-right">Facturas</th><th class="text-right">Total facturado</th>
                </tr></thead>
                <tbody>
                  ${(data.topClientes || []).length === 0
                    ? '<tr><td colspan="5" class="text-center text-muted" style="padding:30px">Aún no hay clientes con facturación</td></tr>'
                    : data.topClientes.map((c, i) => `
                      <tr>
                        <td><strong style="color:var(--primary)">#${i + 1}</strong></td>
                        <td>${escapeHtml(c.razon_social)}</td>
                        <td><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px">${escapeHtml(c.identificacion)}</code></td>
                        <td class="text-right"><strong>${c.facturas}</strong></td>
                        <td class="text-right" style="color:var(--success);font-weight:600">${fmtMoney(c.total, moneda)}</td>
                      </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `);
        
        // ====== Charts ======
        // Línea facturación por mes
        const ctxMes = document.getElementById('chart-meses').getContext('2d');
        const meses = data.porMes || [];
        const labels = meses.map(m => {
          const [y, mo] = m.mes.split('-');
          return MONTH_NAMES[parseInt(mo, 10) - 1] + ' ' + y.substring(2);
        });
        const valores = meses.map(m => Number(m.total || 0));

        const grad = ctxMes.createLinearGradient(0, 0, 0, 280);
        grad.addColorStop(0, 'rgba(37,99,235,0.4)');
        grad.addColorStop(1, 'rgba(37,99,235,0)');

        new Chart(ctxMes, {
          type: 'line',
          data: {
            labels: labels.length ? labels : ['Sin datos'],
            datasets: [{
              label: 'Facturación',
              data: valores.length ? valores : [0],
              fill: true,
              backgroundColor: grad,
              borderColor: '#2563eb',
              borderWidth: 2.5,
              pointBackgroundColor: '#2563eb',
              pointBorderColor: 'white',
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 7,
              tension: 0.35
            }]
          },
          options: chartOptions(moneda)
        });

        // Doughnut estados
        const ctxEst = document.getElementById('chart-estados').getContext('2d');
        new Chart(ctxEst, {
          type: 'doughnut',
          data: {
            labels: ['Emitidas', 'Borradores', 'Canceladas'],
            datasets: [{
              data: [Number(t.emitidas || 0), Number(t.borradores || 0), Number(t.canceladas || 0)],
              backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
              borderColor: 'white',
              borderWidth: 3,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { position: 'bottom', labels: { padding: 15, font: { size: 12 }, usePointStyle: true, pointStyle: 'circle' } }
            }
          }
        });

      } catch (err) {
        setContent(`<div class="alert alert-error">Error cargando dashboard: ${err.message}</div>`);
      }
    })();

    function chartOptions(moneda) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(15,23,42,0.95)',
            padding: 10,
            titleFont: { size: 12 },
            bodyFont: { size: 13 },
            callbacks: {
              label: ctx => fmtMoney(ctx.parsed.y ?? ctx.parsed.x ?? ctx.parsed, moneda)
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: {
            grid: { color: '#f1f5f9' },
            ticks: { font: { size: 11 }, callback: v => fmtMoney(v, moneda).replace(/\.00$/, '') }
          }
        }
      };
    }
  </script>
</body>
</html>
