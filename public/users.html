<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios - FactuElectrónica</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    renderLayout('users', 'Gestión de Usuarios');
    if (Auth.user?.rol !== 'admin') {
      setContent('<div class="alert alert-error">Solo administradores pueden acceder a esta sección.</div>');
    } else {
      init();
    }

    async function init() {
      const { data } = await API.get('/users');
      setContent(`
        <div class="card p-0">
          <div class="card-header">
            <h2>Usuarios del sistema</h2>
            <button class="btn btn-primary" onclick="openModal()">+ Nuevo usuario</button>
          </div>
          </div>
          <div id="alert-box" style="padding:0 22px"></div>
          <div class="table-wrapper">
          <table class="table">
            <thead><tr>
              <th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th>
              <th>Último login</th><th class="text-right">Acciones</th>
            </tr></thead>
            <tbody>
              ${data.map(u => `
                <tr>
                  <td>${escapeHtml(u.nombre)} ${escapeHtml(u.apellido)}</td>
                  <td>${escapeHtml(u.email)}</td>
                  <td><span class="badge" style="background:#dbeafe;color:#1e40af">${escapeHtml(u.rol)}</span></td>
                  <td>${u.activo ? '✓' : '✗'}</td>
                  <td>${fmtDateTime(u.ultimo_login) || '-'}</td>
                  <td class="text-right">
                    <button class="btn btn-sm btn-secondary" onclick='edit(${JSON.stringify(u)})'>Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="remove(${u.id})">Desactivar</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="modal-overlay" id="modal">
          <div class="modal">
            <div class="modal-header">
              <h2 id="modal-title">Usuario</h2>
              <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
              <form id="form">
                <input type="hidden" id="f-id">
                <div class="form-row">
                  <div class="form-group"><label>Nombre *</label><input id="f-nombre" required></div>
                  <div class="form-group"><label>Apellido *</label><input id="f-apellido" required></div>
                </div>
                <div class="form-group"><label>Email *</label><input type="email" id="f-email" required></div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Rol *</label>
                    <select id="f-rol" required>
                      <option value="admin">Administrador</option>
                      <option value="contador">Contador</option>
                      <option value="vendedor" selected>Vendedor</option>
                      <option value="consulta">Consulta</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label>Activo</label>
                    <select id="f-activo">
                      <option value="1" selected>Sí</option><option value="0">No</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label>Contraseña <small class="text-muted">(dejar vacío para no cambiar)</small></label>
                  <input type="password" id="f-password" autocomplete="new-password">
                </div>
                <div class="form-actions">
                  <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                  <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      `);
      document.getElementById('form').addEventListener('submit', save);
    }

    function openModal() {
      document.getElementById('form').reset();
      document.getElementById('f-id').value = '';
      document.getElementById('modal-title').textContent = 'Nuevo usuario';
      document.getElementById('modal').classList.add('active');
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function edit(u) {
      document.getElementById('f-id').value = u.id;
      document.getElementById('f-nombre').value = u.nombre;
      document.getElementById('f-apellido').value = u.apellido;
      document.getElementById('f-email').value = u.email;
      document.getElementById('f-rol').value = u.rol;
      document.getElementById('f-activo').value = u.activo ? '1' : '0';
      document.getElementById('f-password').value = '';
      document.getElementById('modal-title').textContent = 'Editar usuario';
      document.getElementById('modal').classList.add('active');
    }
    async function save(e) {
      e.preventDefault();
      const id = document.getElementById('f-id').value;
      const body = {
        nombre: document.getElementById('f-nombre').value,
        apellido: document.getElementById('f-apellido').value,
        email: document.getElementById('f-email').value,
        rol: document.getElementById('f-rol').value,
        activo: document.getElementById('f-activo').value === '1',
        password: document.getElementById('f-password').value || undefined
      };
      try {
        if (id) await API.put(`/users/${id}`, body);
        else    await API.post('/users', body);
        closeModal();
        showAlert('#alert-box', 'Guardado', 'success');
        setTimeout(() => location.reload(), 600);
      } catch (err) {
        showAlert('#alert-box', err.message);
      }
    }
    async function remove(id) {
      if (!confirm('¿Desactivar usuario?')) return;
      await API.del(`/users/${id}`);
      location.reload();
    }
  </script>
</body>
</html>
